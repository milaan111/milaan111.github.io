<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Contact Info</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; max-width: 350px; width: 100%; }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; }
        .btn { display: block; background: #007bff; color: white; padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 25px; font-weight: bold; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Your Name</h1>
        <p>Your Profession / Bio</p>
        
        <!-- Change the links below to your actual details -->
        <a class="btn" href="tel:+1234567890">📞 Call Me</a>
        <a class="btn" href="mailto:your-email@example.com">✉️ Email Me</a>
        <a class="btn" href="https://linkedin.com" target="_blank">💼 LinkedIn</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milaan Patel - Contact</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .card { 
            background: #1e1e1e; 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            max-width: 360px; 
            width: 100%;
            border: 1px solid #2a2a2a;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: #333;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #007bff;
            border: 2px solid #007bff;
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: #ffffff; font-weight: 700; }
        p { font-size: 14px; color: #a0a0a0; margin-bottom: 30px; }
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            background: #007bff; 
            color: white; 
            padding: 16px; 
            margin: 14px 0; 
            text-decoration: none; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 16px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: #0056b3; }
        .btn:active { transform: scale(0.98); }
        .btn-email { background: #222; border: 1px solid #444; }
        .btn-email:hover { background: #333; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">MP</div>
        <h1>Milaan Patel</h1>
        <p>Scan to Connect</p>
        
        <!-- Action links that open native phone apps -->
        <a class="btn" href="tel:+447979309148">📞 Call Number</a>
        <a class="btn btn-email" href="mailto:milaanpatel12@gmail.com">✉️ Send Email</a>
    </div>
</body>
</html>

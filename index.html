<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milaan Patel - Connect</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #0f0c1b 0%, #1a103c 50%, #0d1b2a 100%);
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated glowing accent in the background */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.4) 0%, rgba(0, 0, 0, 0) 70%);
            top: 15%;
            left: 20%;
            z-index: 0;
            animation: floatGlow 8s ease-in-out infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.2); }
        }

        /* Glassmorphic Container Card */
        .card { 
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 35px; 
            border-radius: 28px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1); 
            text-align: center; 
            max-width: 360px; 
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes wiggle {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-6px) rotate(-1.5deg); }
            30% { transform: translateX(5px) rotate(1deg); }
            45% { transform: translateX(-4px) rotate(-1deg); }
            60% { transform: translateX(3px) rotate(0.5deg); }
            75% { transform: translateX(-2px) rotate(-0.5deg); }
        }

        .wiggle-active {
            animation: wiggle 0.5s ease-in-out;
        }

        /* Animated Initial Avatar */
        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #7b2cbf 0%, #3a0ca3 100%);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(123, 44, 191, 0.5),
                        0 0 0 4px rgba(255, 255, 255, 0.05);
            letter-spacing: 1px;
        }

        h1 { 
            font-size: 26px; 
            margin-bottom: 8px; 
            color: #ffffff; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }

        p { 
            font-size: 13px; 
            color: #b0aeb7; 
            margin-bottom: 35px; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            line-height: 1.4;
        }

        /* High-End Modern Buttons */
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            color: white; 
            padding: 16px; 
            margin: 14px 0; 
            text-decoration: none; 
            border-radius: 16px; 
            font-weight: 600; 
            font-size: 15px; 
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            z-index: 2;
        }

        .btn-phone {
            background: #ffffff;
            color: #0f0c1b;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .btn-phone:hover { 
            background: #e5e5e5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }

        .btn-email { 
            background: rgba(255, 255, 255, 0.06); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-email:hover { 
            background: rgba(255, 255, 255, 0.12); 
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* New High-Contrast Save Contact Button */
        .btn-save {
            background: linear-gradient(135deg, #7b2cbf 0%, #5a189a 100%);
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.3);
        }

        .btn-save:hover {
            background: linear-gradient(135deg, #9d4edd 0%, #7b2cbf 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 44, 191, 0.5);
        }

        .btn:active { 
            transform: translateY(1px); 
        }
    </style>
</head>
<body>
    <div class="card" id="contactCard">
        <div class="avatar">MP</div>
        <h1>Milaan Patel</h1>
        <p>Congratulations, you successfully scanned a piece of plastic.</p>
        
        <!-- Premium Action Buttons -->
        <a class="btn btn-phone" href="tel:+447979309148" onclick="event.stopPropagation();">📞 +44 7979 309148</a>
        <a class="btn btn-email" href="mailto:milaanpatel12@gmail.com" onclick="event.stopPropagation();">✉️ milaanpatel12@gmail.com</a>
        
        <!-- New Save Contact Button (Links to your vCard file) -->
        <a class="btn btn-save" href="milaan.vcf" download="Milaan_Patel.vcf" onclick="event.stopPropagation();">👤 Add to Contacts</a>
    </div>

    <script>
        const card = document.getElementById('contactCard');
        
        card.addEventListener('click', () => {
            card.classList.remove('wiggle-active');
            void card.offsetWidth; 
            card.classList.add('wiggle-active');
        });

        card.addEventListener('animationend', (e) => {
            if (e.animationName === 'wiggle') {
                card.classList.remove('wiggle-active');
            }
        });
    </script>
</body>
</html>

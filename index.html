<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milaan Patel - Connect</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #0f0c1b 0%, #1a103c 50%, #0d1b2a 100%);
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated glowing accent in the background */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.4) 0%, rgba(0, 0, 0, 0) 70%);
            top: 15%;
            left: 20%;
            z-index: 0;
            animation: floatGlow 8s ease-in-out infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.2); }
        }

        /* Glassmorphic Container Card */
        .card { 
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 35px; 
            border-radius: 28px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1); 
            text-align: center; 
            max-width: 360px; 
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animated Initial Avatar */
        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #7b2cbf 0%, #3a0ca3 100%);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(123, 44, 191, 0.5),
                        0 0 0 4px rgba(255, 255, 255, 0.05);
            letter-spacing: 1px;
        }

        h1 { 
            font-size: 26px; 
            margin-bottom: 6px; 
            color: #ffffff; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }

        p { 
            font-size: 14px; 
            color: #b0aeb7; 
            margin-bottom: 35px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* High-End Modern Buttons */
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            color: white; 
            padding: 16px; 
            margin: 16px 0; 
            text-decoration: none; 
            border-radius: 16px; 
            font-weight: 600; 
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-phone {
            background: #ffffff;
            color: #0f0c1b;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .btn-phone:hover { 
            background: #e5e5e5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }

        .btn-email { 
            background: rgba(255, 255, 255, 0.06); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-email:hover { 
            background: rgba(255, 255, 255, 0.12); 
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .btn:active { 
            transform: translateY(1px); 
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">MP</div>
        <h1>Milaan Patel</h1>
        <p>Connect With Me</p>
        
        <!-- Premium Action Buttons -->
        <a class="btn btn-phone" href="tel:+447979309148">📞 Call Number</a>
        <a class="btn btn-email" href="mailto:milaanpatel12@gmail.com">✉️ Send Email</a>
    </div>
</body>
</html>
